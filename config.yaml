# D&D Character Sheet Configuration

# ── Colors ────────────────────────────────────────────────────────────────────
# Colors can be set to CSS values: hex (#1a1a2e), rgb(0,0,0), or named colors.

# Background colors
main_bg: "#d5f0d9"
sidebar_bg: "white"
card_bg: "#BBE4C0"
card_hover_bg: "#A6D2AB"
tag_bg: "#CAEACE"
dialog_bg: "white"
button_bg: "#4caf50"

# Text colors
primary_font_color: "black"
# Secondary font is used for the headers, tab selection underline, links, and tags.
secondary_font_color: "#35803E"
button_font_color: "white"

# sep_color is used for row separators in the level log table and --- separators in the 2-col display.
sep_color: "#35803E"

# ── Fonts ──────────────────────────────────────────────────────────────────
# Fonts can be set to any web-safe font or Google Fonts name. Examples:
#   "Helvetica Neue, Arial, sans-serif", "Cinzel", "Georgia"
# Font sizes are integers in pixels. Recommended range: 12–20.

main_font: "Helvetica Neue, Arial, sans-serif"
main_font_size: 14
header_font: "Helvetica Neue, Arial, sans-serif"
header_font_size: 18

# ── Backup ─────────────────────────────────────────────────────────────────────
# File extension used for automatic backup saves. The backup file is written
# alongside the character sheet on every change.
backup_extension: ".bak"

# ── Input sizing ───────────────────────────────────────────────────────────────
# Reference strings used to size input boxes.
# Each key here must also appear in _DEFAULTS in dndcs.py.
# To wire a key to a field, add data-sizing-key="<key>" to the input in index.html.

# Used for player name and character name.
name_sizing_text: "Longgggggggggggg Longgggg Longgggggggggggg"
class_sizing_text: "Fighter (5) / Wizard (5) / Ranger (5) / Druid (5) / Bard (5)"
# Used for HD.
hd_sizing_text: "10d10 + 10d8 + 10d6 + 10d6 + 10d6"
experience_sizing_text: "1000000"
subclass_sizing_text: "Champion / Bladesinger / Hunter / Circle of the Land / Lore"
# Used for race, background, and alignment.
race_line_sizing_text: "guild artisan (brewers) extra text"
# Used for age, height, weight, and size category.
physical_measureable_sizing_text: "monstrosity"
# Used for eyes, hair, and skin.
physical_description_sizing_text: "Auburn with streaks and bangs"
# Used for class field in the level log dialog.
level_log_class_sizing_text: "FighterFighter"
# Used for the bio header Level field and numeric level display in the level log dialog and table.
std_num_sizing_text: " 20 "
