# D&D Character Sheet Configuration

# * Colors can be set to CSS values: hex (#1a1a2e), rgb(0,0,0), or named
#   colors.
# * Fonts can be set to any web-safe font or Google Fonts name. Examples:
#   "Helvetica Neue, Arial, sans-serif", "Cinzel", "Georgia"
# * Font sizes are integers in pixels. Recommended range: 12–20.

# ── Backgrounds ────────────────────────────────────────────────────────────────

# Primary/sidebar/card/tag background colors
main_bg: "#d5f0d9"
sidebar_bg: "white"
card_bg: "#A9DCAF"
tag_bg: "#CAEACE"

# Background color for textboxes
textbox_selected_bg: "white"
textbox_unselected_bg: "white"

# ── Sheet ──────────────────────────────────────────────────────────────────────
# Applies to non-headers and non-button text. For example, it applies to: fields,
# textboxes, and hint text at the bottom of the data-expandable dialog box.

sheet_font: "Helvetica Neue, Arial, sans-serif"
sheet_font_size: 16
sheet_font_color: "black"

# ── Header ─────────────────────────────────────────────────────────────────────
# Applies to: tab labels, tab selection underline, sidebar section title, link text.

header_font: "Helvetica Neue, Arial, sans-serif"
header_font_size: 18
header_font_color: "#35803E"

# ── Buttons ────────────────────────────────────────────────────────────────────

button_font: "Helvetica Neue, Arial, sans-serif"
button_font_size: 16
button_bg: "#4caf50"
button_font_color: "#ffffff"
save_button_bg: "#4caf50"
save_button_font_color: "#ffffff"

# ── Backup ─────────────────────────────────────────────────────────────────────
# File extension used for automatic backup saves. The backup file is written
# alongside the character sheet on every change.
backup_extension: ".bak"

# ── Input sizing ───────────────────────────────────────────────────────────────
# Reference strings used to size input boxes.

# Used for player name and character name.
name_sizing_text: "Longgggggggggggg Longgggg Longgggggggggggg"
class_sizing_text: "Fighter / Wizard / Ranger/ Druid / Bard"
level_sizing_text: "20 / 20 / 20 / 20 / 20"
# Used for HD.
hd_sizing_text: "10d10 + 10d8 + 10d6"
experience_sizing_text: "1000000"
subclass_sizing_text: "Champion / Bladesinger / Hunter / Circle of the Land / Lore"
# Used for race, background, and alignment.
race_line_sizing_text: "guild artisan (brewers) extra text"
# Used for age, height, weight, and size category.
physical_measureable_sizing_text: "240"
# Used for eyes, hair, and skin.
physical_description_sizing_text: "Auburn with streaks"
