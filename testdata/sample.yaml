bio:
  player_name: Ryan
  character_name: Ser Aldric Vane
  class: Fighter
  subclass: Champion
  experience: '23000'
  level: '7'
  hd: 7d10
  race: Human (Variant)
  background: Noble
  alignment: Lawful Good
  age: '34'
  height: 6'1"
  weight: '195'
  size_category: M
  eyes: Steel grey
  hair: Black, silver at the temples
  skin: Fair
  personality_traits: |-
    I hold myself and [others](https://en.wikipedia.org/wiki/Chivalry) to an exacting standard. When given a choice between the honorable path and the easy one, I do not hesitate.

    I have little patience for cowardice or cruelty, and I say so plainly.
  ideals: Honor. A knight's word is a bond that cannot be broken — I would sooner
    fall in battle than break an oath.
  bonds: My younger sister Mira was taken by the Crimson Hand three years ago. Finding
    her drives every decision I make.
  traits: I am slow to trust those who have not proven themselves in hardship. I find
    it nearly impossible to ask for help.
  background_history: |-
    Born the eldest son of [House Vane](https://en.wikipedia.org/wiki/Noble_house), a minor noble family in the borderlands, Aldric was trained as a knight from childhood. His father was a stern man who believed weakness was a choice. By twelve Aldric could ride and shoot; by fifteen he was apprenticed as a squire to Sir Brennan Coldforge of the [King's Vanguard](https://en.wikipedia.org/wiki/Household_cavalry).
    ---
    At nineteen, Aldric earned his spurs at the **Battle of Greyford Crossing**, holding a river passage against a warband of eighty with only eleven other soldiers for six hours until reinforcements arrived. The King's Herald read his name at court. He took the oath of the Vanguard and served with distinction for eight years, campaigning across four provinces.
    ---
    Three years ago his sister Mira, visiting Crestfall to oversee a family estate matter, vanished without word. The town guard found only her horse. Aldric's investigation uncovered signs of the [Crimson Hand](https://en.wikipedia.org/wiki/Cult) — a cult he had encountered twice during his Vanguard years. He brought his suspicions to his commanding officer and was told, quietly, to drop it. He resigned his commission the next morning.
    ---
    **[House Vane](https://en.wikipedia.org/wiki/Noble_house)** — Estranged. His father considers the resignation a permanent disgrace to the family name and has not replied to Aldric's letters.

    **Sir Brennan Coldforge** — Former mentor, now Knight-Commander of the Vanguard. Still loyal to Aldric personally, but bound by orders he will not discuss. They meet in secret twice a year.

    **The [Ember Compact](https://en.wikipedia.org/wiki/Monster_hunter)** — A loose network of monster hunters who aided Aldric during the Thornvale incident. He owes them a significant favor; they have not yet called it in.
    ---
    **Mira Vane** — Younger sister, whereabouts unknown. A torn fragment of her travelling cloak was found in the east tunnel of the Crestfall mill cellar. She was alive when they moved her.

    **The Crimson Hand** — A cult with an unclear purpose. Their agents have surfaced in three different regions. Someone with money and influence is backing them — the ledger suggests the scale of the operation exceeds anything a fringe group could sustain alone.
