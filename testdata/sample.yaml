    _"The bearer has rendered service to the Compact and is known to us. Extend reasonable trust and assistance where it does not compromise your work."_
  location: saddlebag
  weight: '0'
campaign_notes:
- tags:
  - session-1
  - setup
  text: |-
    Met the party at the **Silver Stag** inn in Crestfall — Zira (tiefling rogue), Brother Ossian (cleric of Pelor), and Wren Ashwick (wizard).

    The innkeeper described disappearances near the old mill over the past month: three farmhands and a travelling merchant, all gone without a trace.

    Agreed to investigate at dawn.
- tags:
  - session-2
  - dungeon
  - combat
  text: |-
    Explored the mill basement. A hidden trapdoor beneath the grinding wheel led to a network of cellars.

    * Defeated six Crimson Hand initiates and a half-orc enforcer named Gruda.
    * Found the ledger — names, dates, payment amounts. Possible informants in town.
    * Gruda surrendered and was handed over to Constable Dunn pending questioning.

    No sign of Mira, but a torn piece of cloth matching her travelling cloak was near the eastern tunnel.
- tags:
  - npc
  - ally
  text: '**Constable Petra Dunn** (Crestfall) — Skeptical of outsiders but warmed
    up after the mill raid. Will share what she learns from Gruda''s questioning.
    Trustworthy within the limits of her jurisdiction.'
- tags:
  - lead
  - crimson-hand
  text: |-
    The ledger names a contact called _the Archivist_, operating out of [Duskport](https://en.wikipedia.org/wiki/Port_city). Likely our next destination.

    Cross-referencing the payment dates with the disappearances: the timing matches almost exactly. The Archivist may be directing the abductions, not just funding them.
- tags:
  - session-3
  - travel
  text: |-
    Set out for Duskport. Three days on the road.

    * Day 1: uneventful. Wren identified a [glyph of warding](https://en.wikipedia.org/wiki/Magic_circle) scratched into a milestone — Crimson Hand marking. They know the road.
    * Day 2: ambushed at dusk by four Hand agents and a cloaked figure who fled when the fight turned. Fast, light armour, [twin blades](https://en.wikipedia.org/wiki/Florentine_fighting). Professional.
    * Day 3: arrived at Duskport. The city is larger than expected. Finding the Archivist will take time.
