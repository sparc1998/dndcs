- gear_type: Campaign Specific
  description: |-
    **Crimson Hand Ledger** — recovered from the Crestfall mill cellar. Lists names, dates, and amounts paid to informants across four towns.

    The name _the Archivist_ appears seven times, always associated with large sums and a [Duskport](https://en.wikipedia.org/wiki/Port_city) location marker. Pages 12–14 have been carefully cut out.
  location: backpack
  weight: '1'
- gear_type: Campaign Specific
  description: |-
    **Mira's cloak fragment** — a torn piece of the grey travelling cloak Aldric gave his sister the winter before she disappeared. Identified by its distinctive **copper-thread border stitch**, a detail only family would know.

    Found in the east tunnel of the mill cellar, partially under a loose flagstone.
  location: chest pocket
  weight: '0'
- gear_type: Campaign Specific
  description: |-
