$schema: "http://json-schema.org/draft-07/schema#"
title: D&D Character Sheet
type: object
required:
  - bio
  - campaign_notes
additionalProperties: false
properties:
  bio:
    type: object
    required:
      - player_name
      - character_name
    additionalProperties: false
    properties:
      player_name:
        type: string
        minLength: 1
      character_name:
        type: string
        minLength: 1
      class:
        type: string
      subclass:
        type: string
      race:
        type: string
      background:
        type: string
      alignment:
        type: string
      age:
        type: string
      height:
        type: string
      weight:
        type: string
      size_category:
        type: string
      eyes:
        type: string
      hair:
        type: string
      skin:
        type: string
      personality_traits:
        type: string
      ideals:
        type: string
      bonds:
        type: string
      traits:
        type: string
      background_history:
        type: string
      level:
        type: string
      hd:
        type: string
      experience:
        type: string
  level_log:
    type: array
    items:
      type: object
      required:
        - class
        - details
      additionalProperties: false
      properties:
        class:
          type: string
        details:
          type: string
  money:
    type: object
    additionalProperties: false
    properties:
      pp:
        type: string
      gp:
        type: string
      ep:
        type: string
      sp:
        type: string
      cp:
        type: string
  gear:
    type: array
    items:
      type: object
      required:
        - gear_type
        - description
        - location
        - weight
      additionalProperties: false
      properties:
        gear_type:
          type: string
          enum:
            - Consumable
            - "Weapons & Armor"
            - General
            - Campaign Specific
        description:
          type: string
        location:
          type: string
        weight:
          type: string
  feats_features:
    type: array
    items:
      type: object
      required:
        - description
      additionalProperties: false
      properties:
        description:
          type: string
  stats:
    type: object
    additionalProperties: false
    properties:
      proficiency_bonus:
        type: string
      jack_of_all_trades:
        type: boolean
      save_bonus:
        type: string
  campaign_notes:
    type: array
    items:
      type: object
      required:
        - tags
        - text
      additionalProperties: false
      properties:
        tags:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        text:
          type: string
