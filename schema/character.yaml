$schema: "http://json-schema.org/draft-07/schema#"
title: D&D Character Sheet
type: object
required:
  - bio
  - campaign_notes
additionalProperties: false
properties:
  bio:
    type: object
    required:
      - player_name
      - character_name
    additionalProperties: false
    properties:
      player_name:
        type: string
        minLength: 1
      character_name:
        type: string
        minLength: 1
      class:
        type: string
      level:
        type: string
      experience:
        type: string
  campaign_notes:
    type: array
    items:
      type: object
      required:
        - tags
        - notes
      additionalProperties: false
      properties:
        tags:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        notes:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
