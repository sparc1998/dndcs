<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&amp;D Character Sheet</title>
  <style>
    :root {
      --main-bg: #f2f2f2;
      --sidebar-bg: #e4e6e8;
      --textbox-selected-bg: #ffffff;
      --textbox-unselected-bg: #ffffff;
      --card-bg: #eaeaea;
      --tag-bg: #c8e6c9;
      --header-font: Helvetica Neue, Arial, sans-serif;
      --header-font-size: 14px;
      --header-fontcolor: #2e7d32;
      --button-font: Helvetica Neue, Arial, sans-serif;
      --button-font-size: 14px;
      --button-fontcolor: #ffffff;
      --button-bg: #4caf50;
      --save-button-bg: #c0392b;
      --save-button-fontcolor: #ffffff;
      --sheet-font: Helvetica Neue, Arial, sans-serif;
      --sheet-font-size: 14px;
      --sheet-fontcolor: #000000;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      background: var(--main-bg);
      color: var(--sheet-fontcolor);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Layout ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1rem;
    }

    #sidebar {
      width: 200px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
      overflow-y: auto;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--sheet-fontcolor);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--sheet-fontcolor);
      cursor: pointer;
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      padding: 0.5rem 1.25rem;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--header-fontcolor);
      border-bottom-color: var(--header-fontcolor);
    }

    .tab-btn:hover:not(.active) {
      color: var(--header-fontcolor);
    }

    /* ── Tab panels ── */
    .panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Form fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      color: var(--sheet-fontcolor);
    }

    input[type="text"],
    textarea {
      background: var(--textbox-selected-bg);
      border: 1px solid var(--textbox-selected-bg);
      border-radius: 6px;
      color: var(--sheet-fontcolor);
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      padding: 0.6rem 0.8rem;
      width: 100%;
      transition: border-color 0.15s;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--header-fontcolor);
      outline: none;
    }

    /* ── Campaign notes ── */
    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .note-card {
      background: var(--card-bg);
      border: 1px solid var(--card-bg);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .note-card .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .tag-chip {
      background: var(--tag-bg);
      border: 1px solid var(--tag-bg);
      border-radius: 20px;
      color: var(--header-fontcolor);
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      padding: 0.2rem 0.65rem;
    }

    .note-entry {
      color: var(--sheet-fontcolor);
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      line-height: 1.5;
      padding-left: 1rem;
      border-left: 2px solid var(--sheet-fontcolor);
    }

    /* ── Add-note form ── */
    #add-note-section {
      border-top: 1px solid var(--sheet-fontcolor);
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #add-note-section h3 {
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      font-weight: normal;
      color: var(--sheet-fontcolor);
    }

    .btn {
      background: var(--button-bg);
      border: none;
      border-radius: 6px;
      color: var(--button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.6rem 1.2rem;
      transition: background 0.15s, transform 0.05s;
      width: 100%;
    }

    .btn:hover {
      background: var(--button-bg);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* ── Sidebar ── */
    #sidebar h2 {
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      font-weight: normal;
      color: var(--sheet-fontcolor);
      text-align: center;
    }

    #save-btn {
      background: var(--save-button-bg);
      border: none;
      border-radius: 8px;
      color: var(--save-button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.8rem 1.2rem;
      transition: background 0.15s, transform 0.05s;
      width: 100%;
      letter-spacing: 0.04em;
    }

    #save-btn:hover {
      background: var(--save-button-bg);
    }

    #save-btn:active {
      transform: scale(0.97);
    }

    #status {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      color: var(--sheet-fontcolor);
      text-align: center;
      min-height: 1.2em;
    }

    #status.ok {
      color: #2ecc71;
    }

    #status.err {
      color: #e74c3c;
    }

    /* ── Editable display (click-to-edit) ── */
    .field-display {
      display: inline-block;
      cursor: text;
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      color: var(--sheet-fontcolor);
      padding: 0.2rem 0.4rem;
      background: var(--textbox-unselected-bg);
      border: 1px solid var(--textbox-unselected-bg);
      border-radius: 6px;
    }

    .field-display:empty::after {
      content: "—";
      color: var(--sheet-fontcolor);
    }

    .field-display a,
    .note-entry a {
      color: var(--header-fontcolor);
      text-decoration: underline;
    }

    .hidden { display: none !important; }

    /* ── Link dialog ── */
    #link-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #link-dialog-box {
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-bg);
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 340px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }

    #link-dialog-box label {
      color: var(--sheet-fontcolor);
    }

    #link-dialog-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    #link-dialog-btns button {
      background: var(--button-bg);
      border: none;
      border-radius: 6px;
      color: var(--button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.4rem 0.9rem;
    }

    #link-dialog-btns button:hover {
      background: var(--button-bg);
    }

    #link-cancel-btn {
      background: var(--sidebar-bg);
      color: var(--sheet-fontcolor);
    }

    #link-cancel-btn:hover {
      background: var(--sidebar-bg);
    }

    #link-remove-btn {
      background: var(--save-button-bg);
      color: var(--save-button-fontcolor);
    }

    #link-remove-btn:hover {
      background: var(--save-button-bg);
    }

    /* ── Edit popover ── */
    #edit-popover {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #edit-popover-box {
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-bg);
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 50%;
      height: 22em;
      min-width: 200px;
      min-height: 8em;
      resize: both;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }

    #edit-popover-textarea {
      flex: 1;
      min-height: 0;
      resize: none;
      width: 100%;
    }

    #edit-popover-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    #edit-popover-btns button {
      background: var(--button-bg);
      border: none;
      border-radius: 6px;
      color: var(--button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.4rem 0.9rem;
    }
  </style>
</head>

<body>
  <section id="main">
    <nav id="tabs">
      <button class="tab-btn active" data-tab="bio">Bio</button>
      <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
    </nav>

    <!-- Bio panel -->
    <div id="panel-bio" class="panel active">
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="player-name">Player Name</label>
          <span id="player-name-display" class="field-display"></span>
          <input type="text" id="player-name" class="hidden" placeholder="Your name" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="character-name">Character Name</label>
          <span id="character-name-display" class="field-display"></span>
          <input type="text" id="character-name" class="hidden" placeholder="Character name" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
      </div>
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="class">Class(es)</label>
          <span id="class-display" class="field-display"></span>
          <input type="text" id="class" class="hidden" placeholder="Class" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="level">Level(s)</label>
          <span id="level-display" class="field-display"></span>
          <input type="text" id="level" class="hidden" placeholder="Level" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="experience">Experience</label>
          <span id="experience-display" class="field-display"></span>
          <input type="text" id="experience" class="hidden" placeholder="Experience" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
      </div>
    </div>

    <!-- Campaign Notes panel -->
    <div id="panel-campaign" class="panel">
      <div id="notes-list"></div>

      <div id="add-note-section">
        <h3>Add Note</h3>
        <div class="field">
          <label for="new-tags">Tags (comma-separated)</label>
          <input type="text" id="new-tags" placeholder="session-3, dungeon" data-linkable />
        </div>
        <div class="field">
          <label for="new-note">Note</label>
          <textarea id="new-note" rows="3" placeholder="Write a note…" data-linkable></textarea>
        </div>
        <button class="btn" id="add-note-btn">Add Note</button>
      </div>
    </div>
  </section>

  <aside id="sidebar">
    <h2>Actions</h2>
    <button id="save-btn">Save</button>
    <div id="status"></div>
  </aside>

  <div id="edit-popover" class="hidden" role="dialog" aria-modal="true">
    <div id="edit-popover-box">
      <textarea id="edit-popover-textarea" data-linkable></textarea>
      <div id="edit-popover-btns">
        <button id="edit-popover-done-btn">Done</button>
      </div>
    </div>
  </div>

  <div id="link-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="link-dialog-box">
      <label for="link-url">URL</label>
      <input type="text" id="link-url" placeholder="https://…" />
      <div id="link-dialog-btns">
        <button id="link-ok-btn">OK</button>
        <button id="link-remove-btn" class="hidden">Remove link</button>
        <button id="link-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let character = null;

    const _measureCanvas = document.createElement("canvas");

    function escHtml(s) {
      return s.replace(/[<>&"]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));
    }

    function renderLinks(raw) {
      const linkRe = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
      let result = "";
      let last = 0;
      let m;
      while ((m = linkRe.exec(raw)) !== null) {
        result += escHtml(raw.slice(last, m.index));
        result += `<a href="${escHtml(m[2])}" target="_blank" rel="noopener noreferrer">${escHtml(m[1])}</a>`;
        last = m.index + m[0].length;
      }
      result += escHtml(raw.slice(last));
      return result;
    }

    function updateDisplay(displayEl, rawText) {
      displayEl.innerHTML = renderLinks(rawText);
    }

    let _linkDialogOpen = false;
    let _linkTarget = null;

    let _editPopoverField = null;
    let _editPopoverDisplay = null;

    function openEditPopover(inputEl, displayEl) {
      _editPopoverField = inputEl;
      _editPopoverDisplay = displayEl;
      const ta = document.getElementById("edit-popover-textarea");
      ta.value = inputEl.value;
      document.getElementById("edit-popover").classList.remove("hidden");
      requestAnimationFrame(() => { ta.focus(); });
    }

    function closeEditPopover() {
      if (_editPopoverField) {
        const ta = document.getElementById("edit-popover-textarea");
        _editPopoverField.value = ta.value;
        updateDisplay(_editPopoverDisplay, ta.value);
        autosave();
      }
      document.getElementById("edit-popover").classList.add("hidden");
      _editPopoverField = null;
      _editPopoverDisplay = null;
    }

    document.querySelectorAll("[data-expandable]").forEach((input) => {
      const display = document.getElementById(input.id + "-display");
      if (display) display.addEventListener("click", (e) => {
        if (e.target.closest("a")) return;
        openEditPopover(input, display);
      });
    });

    function openLinkDialog(el) {
      const selStart = el.selectionStart;
      const selEnd = el.selectionEnd;
      if (selStart === selEnd) return;

      const raw = el.value;
      const linkRe = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
      let existingMatch = null;
      let m;
      while ((m = linkRe.exec(raw)) !== null) {
        if (selStart >= m.index && selEnd <= m.index + m[0].length) {
          existingMatch = m;
          break;
        }
      }

      _linkTarget = { el, selStart, selEnd, existingMatch };
      _linkDialogOpen = true;

      const urlInput = document.getElementById("link-url");
      urlInput.value = existingMatch ? existingMatch[2] : "";
      document.getElementById("link-remove-btn").classList.toggle("hidden", !existingMatch);
      document.getElementById("link-dialog").classList.remove("hidden");
      requestAnimationFrame(() => { urlInput.focus(); urlInput.select(); });
    }

    function closeLinkDialog(returnFocus = true) {
      _linkDialogOpen = false;
      document.getElementById("link-dialog").classList.add("hidden");
      if (returnFocus && _linkTarget) _linkTarget.el.focus();
      _linkTarget = null;
    }

    function applyLink(url) {
      if (!_linkTarget) return;
      const { el, selStart, selEnd, existingMatch } = _linkTarget;
      const raw = el.value;
      let newValue;

      if (existingMatch) {
        const start = existingMatch.index;
        const end = existingMatch.index + existingMatch[0].length;
        newValue = url
          ? raw.slice(0, start) + `[${existingMatch[1]}](${url})` + raw.slice(end)
          : raw.slice(0, start) + existingMatch[1] + raw.slice(end);
      } else {
        const selectedText = raw.slice(selStart, selEnd);
        newValue = url
          ? raw.slice(0, selStart) + `[${selectedText}](${url})` + raw.slice(selEnd)
          : raw;
      }

      el.value = newValue;
      if (el === document.getElementById("edit-popover-textarea") && _editPopoverField) {
        _editPopoverField.value = newValue;
      }
      autosave();
      closeLinkDialog(true);
    }

    document.getElementById("link-ok-btn").addEventListener("click", () => {
      applyLink(document.getElementById("link-url").value.trim());
    });
    document.getElementById("link-remove-btn").addEventListener("click", () => applyLink(""));
    document.getElementById("link-cancel-btn").addEventListener("click", () => closeLinkDialog(true));
    document.getElementById("link-url").addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyLink(document.getElementById("link-url").value.trim());
      if (e.key === "Escape") closeLinkDialog(true);
    });
    document.getElementById("link-dialog").addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLinkDialog(true);
    });

    document.getElementById("edit-popover-done-btn").addEventListener("click", closeEditPopover);
    let _backdropMousedown = false;
    document.getElementById("edit-popover").addEventListener("mousedown", (e) => {
      _backdropMousedown = e.target === document.getElementById("edit-popover");
    });
    document.getElementById("edit-popover").addEventListener("click", (e) => {
      if (_backdropMousedown && e.target === document.getElementById("edit-popover")) closeEditPopover();
    });
    document.getElementById("edit-popover").addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !_linkDialogOpen) closeEditPopover();
    });
    document.getElementById("edit-popover-textarea").addEventListener("input", () => {
      if (_editPopoverField) {
        _editPopoverField.value = document.getElementById("edit-popover-textarea").value;
        autosave();
      }
    });

    function fitInput(el, sizingText) {
      const wasHidden = el.classList.contains("hidden");
      if (wasHidden) el.classList.remove("hidden");
      const ctx = _measureCanvas.getContext("2d");
      ctx.font = getComputedStyle(el).font;
      const textW = ctx.measureText(sizingText).width;
      const cs = getComputedStyle(el);
      const padW = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight) + 4;
      const w = (textW + padW) + "px";
      el.style.width = w;
      const display = document.getElementById(el.id + "-display");
      if (display) display.style.width = w;
      if (wasHidden) el.classList.add("hidden");
    }

    async function applyConfig() {
      const res = await fetch("/api/config");
      const cfg = await res.json();
      const root = document.documentElement;

      const direct = [
        ["main_bg", "--main-bg"],
        ["sidebar_bg", "--sidebar-bg"],
        ["textbox_selected_bg", "--textbox-selected-bg"],
        ["textbox_unselected_bg", "--textbox-unselected-bg"],
        ["card_bg", "--card-bg"],
        ["tag_bg", "--tag-bg"],
        ["header_font", "--header-font"],
        ["header_fontcolor", "--header-fontcolor"],
        ["button_font", "--button-font"],
        ["button_fontcolor", "--button-fontcolor"],
        ["button_bg", "--button-bg"],
        ["save_button_bg", "--save-button-bg"],
        ["save_button_fontcolor", "--save-button-fontcolor"],
        ["sheet_font", "--sheet-font"],
        ["sheet_fontcolor", "--sheet-fontcolor"],
      ];
      const px = [
        ["header_font_size", "--header-font-size"],
        ["button_font_size", "--button-font-size"],
        ["sheet_font_size", "--sheet-font-size"],
      ];

      for (const [key, cssVar] of direct) {
        if (cfg[key] != null) root.style.setProperty(cssVar, cfg[key]);
      }
      for (const [key, cssVar] of px) {
        if (cfg[key] != null) root.style.setProperty(cssVar, cfg[key] + "px");
      }

      if (cfg.name_sizing_text) {
        fitInput(document.getElementById("player-name"), cfg.name_sizing_text);
        fitInput(document.getElementById("character-name"), cfg.name_sizing_text);
      }
      if (cfg.class_sizing_text)
        fitInput(document.getElementById("class"), cfg.class_sizing_text);
      if (cfg.level_sizing_text)
        fitInput(document.getElementById("level"), cfg.level_sizing_text);
      if (cfg.experience_sizing_text)
        fitInput(document.getElementById("experience"), cfg.experience_sizing_text);
    }

    async function load() {
      const [, charRes] = await Promise.all([applyConfig(), fetch("/api/character")]);
      character = await charRes.json();
      render();
    }

    function render() {
      const playerRaw = character.bio?.player_name ?? "";
      const charRaw = character.bio?.character_name ?? "";
      const classRaw = character.bio?.class ?? "";
      const levelRaw = character.bio?.level ?? "";
      const experienceRaw = character.bio?.experience ?? "";
      document.getElementById("player-name").value = playerRaw;
      document.getElementById("character-name").value = charRaw;
      document.getElementById("class").value = classRaw;
      document.getElementById("level").value = levelRaw;
      document.getElementById("experience").value = experienceRaw;
      updateDisplay(document.getElementById("player-name-display"), playerRaw);
      updateDisplay(document.getElementById("character-name-display"), charRaw);
      updateDisplay(document.getElementById("class-display"), classRaw);
      updateDisplay(document.getElementById("level-display"), levelRaw);
      updateDisplay(document.getElementById("experience-display"), experienceRaw);
      renderNotes();
    }

    function renderNotes() {
      const list = document.getElementById("notes-list");
      list.innerHTML = "";
      (character.campaign_notes ?? []).forEach((note) => {
        const card = document.createElement("div");
        card.className = "note-card";

        const tagsRow = document.createElement("div");
        tagsRow.className = "tags-row";
        (note.tags ?? []).forEach((tag) => {
          const chip = document.createElement("span");
          chip.className = "tag-chip";
          chip.textContent = tag;
          tagsRow.appendChild(chip);
        });
        card.appendChild(tagsRow);

        (note.notes ?? []).forEach((n) => {
          const p = document.createElement("p");
          p.className = "note-entry";
          p.innerHTML = renderLinks(n);
          card.appendChild(p);
        });

        list.appendChild(card);
      });
    }

    function collectCharacter() {
      return {
        bio: {
          player_name: document.getElementById("player-name").value,
          character_name: document.getElementById("character-name").value,
          class: document.getElementById("class").value,
          level: document.getElementById("level").value,
          experience: document.getElementById("experience").value,
        },
        campaign_notes: character.campaign_notes ?? [],
      };
    }

    async function autosave() {
      const data = collectCharacter();
      character = data;
      await fetch("/api/character", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
    }

    function setStatus(msg, cls) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = cls;
      if (cls === "ok") setTimeout(() => (el.textContent = ""), 2500);
    }

    document.getElementById("player-name").addEventListener("input", autosave);
    document.getElementById("character-name").addEventListener("input", autosave);
    document.getElementById("class").addEventListener("input", autosave);
    document.getElementById("level").addEventListener("input", autosave);
    document.getElementById("experience").addEventListener("input", autosave);

    document.querySelectorAll("[data-linkable]").forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); openLinkDialog(el); }
      });
    });

    document.getElementById("add-note-btn").addEventListener("click", async () => {
      const rawTags = document.getElementById("new-tags").value;
      const rawNote = document.getElementById("new-note").value.trim();
      if (!rawNote) return;
      const tags = rawTags
        .split(",")
        .map((t) => t.trim())
        .filter(Boolean);
      if (tags.length === 0) tags.push("general");
      character.campaign_notes = character.campaign_notes ?? [];
      character.campaign_notes.push({ tags, notes: [rawNote] });
      document.getElementById("new-tags").value = "";
      document.getElementById("new-note").value = "";
      renderNotes();
      await autosave();
    });

    document.getElementById("save-btn").addEventListener("click", async () => {
      try {
        const data = collectCharacter();
        character = data;
        const res = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.ok) {
          setStatus("Saved!", "ok");
        } else {
          setStatus("Error: " + json.error, "err");
        }
      } catch (e) {
        setStatus("Save failed", "err");
      }
    });

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
      });
    });

    load();
  </script>
</body>

</html>
