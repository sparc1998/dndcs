<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&amp;D Character Sheet</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <!-- Main content area: tabs + active panel -->
  <section id="main">
    <nav id="tabs">
      <button class="tab-btn active" data-tab="bio">Bio</button>
      <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
    </nav>

    <!-- Bio panel: character identity fields displayed as click-to-edit spans -->
    <div id="panel-bio" class="panel active">
      <div id="bio-rows">

      <!-- Row 1: player and character name -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="player-name">Player Name</label>
          <span id="player-name-display" class="field-display"></span>
          <input type="hidden" id="player-name" class="hidden" placeholder="Your name" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="character-name">Character Name</label>
          <span id="character-name-display" class="field-display"></span>
          <input type="hidden" id="character-name" class="hidden" placeholder="Character name" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 2: class and subclass -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="class">Class(es)</label>
          <span id="class-display" class="field-display"></span>
          <input type="hidden" id="class" class="hidden" placeholder="Class" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="subclass">Subclass(es)</label>
          <span id="subclass-display" class="field-display"></span>
          <input type="hidden" id="subclass" class="hidden" placeholder="Subclass" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 3: experience, level, and HD -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="experience">Experience</label>
          <span id="experience-display" class="field-display"></span>
          <input type="hidden" id="experience" class="hidden" placeholder="Experience" data-formula data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="level">Level(s)</label>
          <span id="level-display" class="field-display"></span>
          <input type="hidden" id="level" class="hidden" placeholder="Level" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="hd">HD</label>
          <span id="hd-display" class="field-display"></span>
          <input type="hidden" id="hd" class="hidden" placeholder="HD" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 4: race, background, and alignment -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="race">Race</label>
          <span id="race-display" class="field-display"></span>
          <input type="hidden" id="race" class="hidden" placeholder="Race" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="background">Background</label>
          <span id="background-display" class="field-display"></span>
          <input type="hidden" id="background" class="hidden" placeholder="Background" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="alignment">Alignment</label>
          <span id="alignment-display" class="field-display"></span>
          <input type="hidden" id="alignment" class="hidden" placeholder="Alignment" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 5: age, height, weight, and size category -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="age">Age</label>
          <span id="age-display" class="field-display"></span>
          <input type="hidden" id="age" class="hidden" placeholder="Age" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="height">Height</label>
          <span id="height-display" class="field-display"></span>
          <input type="hidden" id="height" class="hidden" placeholder="Height" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="weight">Weight</label>
          <span id="weight-display" class="field-display"></span>
          <input type="hidden" id="weight" class="hidden" placeholder="Weight" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="size-category">Size Category</label>
          <span id="size-category-display" class="field-display"></span>
          <input type="hidden" id="size-category" class="hidden" placeholder="Size Category" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 6: eyes, hair, and skin -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="eyes">Eyes</label>
          <span id="eyes-display" class="field-display"></span>
          <input type="hidden" id="eyes" class="hidden" placeholder="Eyes" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="hair">Hair</label>
          <span id="hair-display" class="field-display"></span>
          <input type="hidden" id="hair" class="hidden" placeholder="Hair" data-formatable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="skin">Skin</label>
          <span id="skin-display" class="field-display"></span>
          <input type="hidden" id="skin" class="hidden" placeholder="Skin" data-formatable data-expandable />
        </div>
      </div>

      <!-- Row 7: personality traits -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-start;">
        <div class="field" style="flex-direction: row; align-items: flex-start; width: 100%;">
          <label for="personality-traits">Personality<br>Traits</label>
          <span id="personality-traits-display" class="field-display" style="flex: 1; min-width: 0; white-space: pre-wrap; overflow-wrap: break-word;"></span>
          <input type="hidden" id="personality-traits" class="hidden" placeholder="Personality traits" data-formatable data-expandable />
        </div>
      </div>

      </div>
    </div>

    <!-- Campaign Notes panel: scrollable list of past notes + form to add new ones -->
    <div id="panel-campaign" class="panel">
      <div id="notes-list"></div>

      <div id="add-note-section">
        <h3>Add Note</h3>
        <div class="field">
          <label for="new-tags">Tags (comma-separated)</label>
          <input type="text" id="new-tags" placeholder="session-3, dungeon" data-formatable />
        </div>
        <div class="field">
          <label for="new-note">Note</label>
          <textarea id="new-note" rows="3" placeholder="Write a note…" data-formatable></textarea>
        </div>
        <button class="btn" id="add-note-btn">Add Note</button>
      </div>
    </div>
  </section>

  <!-- Sidebar: save action and status feedback -->
  <aside id="sidebar">
    <h2>Actions</h2>
    <button id="save-btn">Save</button>
    <div id="status"></div>
  </aside>

  <!-- Edit dialog: centered resizable textarea opened when clicking a data-expandable field display.
       Sits below the link dialog in z-index so cmd-k still works while editing. -->
  <div id="edit-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="edit-dialog-box">
      <textarea id="edit-dialog-textarea" data-formatable></textarea>
      <div id="edit-dialog-btns">
        <div id="edit-dialog-hints">
          <span id="edit-dialog-hint"></span>
          <span id="edit-dialog-syntax-hint"></span>
        </div>
        <button id="edit-dialog-done-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- Link dialog: small overlay for inserting or removing a markdown link on selected text.
       Sits above the edit dialog in z-index so it can be opened from within it. -->
  <div id="link-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="link-dialog-box">
      <label for="link-url">URL</label>
      <input type="text" id="link-url" placeholder="https://…" />
      <div id="link-dialog-btns">
        <span id="link-dialog-hint"></span>
        <button id="link-ok-btn">Done</button>
        <button id="link-remove-btn" class="hidden">Remove link</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
