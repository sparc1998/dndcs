<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&amp;D Character Sheet</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <!-- Main content area: tabs + active panel -->
  <section id="main">
    <nav id="tabs">
      <button class="tab-btn active" data-tab="bio">Bio</button>
      <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
    </nav>

    <!-- Bio panel: character identity fields displayed as click-to-edit spans -->
    <div id="panel-bio" class="panel active">

      <!-- Row 1: player and character name -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="player-name">Player Name</label>
          <span id="player-name-display" class="field-display"></span>
          <input type="text" id="player-name" class="hidden" placeholder="Your name" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="character-name">Character Name</label>
          <span id="character-name-display" class="field-display"></span>
          <input type="text" id="character-name" class="hidden" placeholder="Character name" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
      </div>

      <!-- Row 2: class, level, and experience -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="class">Class(es)</label>
          <span id="class-display" class="field-display"></span>
          <input type="text" id="class" class="hidden" placeholder="Class" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="level">Level(s)</label>
          <span id="level-display" class="field-display"></span>
          <input type="text" id="level" class="hidden" placeholder="Level" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="experience">Experience</label>
          <span id="experience-display" class="field-display"></span>
          <input type="text" id="experience" class="hidden" placeholder="Experience" style="padding: 0.2rem 0.4rem;" data-formula data-expandable />
        </div>
      </div>

      <!-- Row 3: subclass(es) -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="subclass">Subclass(es)</label>
          <span id="subclass-display" class="field-display"></span>
          <input type="text" id="subclass" class="hidden" placeholder="Subclass" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
      </div>

      <!-- Row 4: race, background, and alignment -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="race">Race</label>
          <span id="race-display" class="field-display"></span>
          <input type="text" id="race" class="hidden" placeholder="Race" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="background">Background</label>
          <span id="background-display" class="field-display"></span>
          <input type="text" id="background" class="hidden" placeholder="Background" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="alignment">Alignment</label>
          <span id="alignment-display" class="field-display"></span>
          <input type="text" id="alignment" class="hidden" placeholder="Alignment" style="padding: 0.2rem 0.4rem;" data-linkable data-expandable />
        </div>
      </div>

    </div>

    <!-- Campaign Notes panel: scrollable list of past notes + form to add new ones -->
    <div id="panel-campaign" class="panel">
      <div id="notes-list"></div>

      <div id="add-note-section">
        <h3>Add Note</h3>
        <div class="field">
          <label for="new-tags">Tags (comma-separated)</label>
          <input type="text" id="new-tags" placeholder="session-3, dungeon" data-linkable />
        </div>
        <div class="field">
          <label for="new-note">Note</label>
          <textarea id="new-note" rows="3" placeholder="Write a note…" data-linkable></textarea>
        </div>
        <button class="btn" id="add-note-btn">Add Note</button>
      </div>
    </div>
  </section>

  <!-- Sidebar: save action and status feedback -->
  <aside id="sidebar">
    <h2>Actions</h2>
    <button id="save-btn">Save</button>
    <div id="status"></div>
  </aside>

  <!-- Edit dialog: centered resizable textarea opened when clicking a data-expandable field display.
       Sits below the link dialog in z-index so cmd-k still works while editing. -->
  <div id="edit-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="edit-dialog-box">
      <textarea id="edit-dialog-textarea" data-linkable></textarea>
      <div id="edit-dialog-btns">
        <div id="edit-dialog-hints">
          <span id="edit-dialog-hint"></span>
          <span id="edit-dialog-syntax-hint"></span>
        </div>
        <button id="edit-dialog-done-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- Link dialog: small overlay for inserting or removing a markdown link on selected text.
       Sits above the edit dialog in z-index so it can be opened from within it. -->
  <div id="link-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="link-dialog-box">
      <label for="link-url">URL</label>
      <input type="text" id="link-url" placeholder="https://…" />
      <div id="link-dialog-btns">
        <button id="link-ok-btn">OK</button>
        <button id="link-remove-btn" class="hidden">Remove link</button>
        <button id="link-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
