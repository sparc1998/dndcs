<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&amp;D Character Sheet</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <!-- Main content area: tabs + active panel -->
  <section id="main">
    <nav id="tabs">
      <button class="tab-btn active" data-tab="bio">Bio</button>
      <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
    </nav>

    <!-- Bio panel: character identity fields displayed as click-to-edit spans -->
    <div id="panel-bio" class="panel active">
      <div id="bio-rows">

      <!-- Row 1: player and character name -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="player-name">Player Name</label>
          <span id="player-name-display" class="field-display"></span>
          <input type="hidden" id="player-name" class="hidden" placeholder="Your name" data-formattable data-expandable data-field-key="player_name" data-sizing-key="name_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="character-name">Character Name</label>
          <span id="character-name-display" class="field-display"></span>
          <input type="hidden" id="character-name" class="hidden" placeholder="Character name" data-formattable data-expandable data-field-key="character_name" data-sizing-key="name_sizing_text" />
        </div>
      </div>

      <!-- Row 2: class and subclass -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="class">Class(es)</label>
          <span id="class-display" class="field-display"></span>
          <input type="hidden" id="class" class="hidden" placeholder="Class" data-formattable data-expandable data-field-key="class" data-sizing-key="class_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="subclass">Subclass(es)</label>
          <span id="subclass-display" class="field-display"></span>
          <input type="hidden" id="subclass" class="hidden" placeholder="Subclass" data-formattable data-expandable data-field-key="subclass" data-sizing-key="subclass_sizing_text" />
        </div>
      </div>

      <!-- Row 3: experience, level, and HD -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="experience">Experience</label>
          <span id="experience-display" class="field-display"></span>
          <input type="hidden" id="experience" class="hidden" placeholder="Experience" data-formula data-expandable data-field-key="experience" data-sizing-key="experience_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="level">Level(s)</label>
          <span id="level-display" class="field-display"></span>
          <input type="hidden" id="level" class="hidden" placeholder="Level" data-formattable data-expandable data-field-key="level" data-sizing-key="level_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="hd">HD</label>
          <span id="hd-display" class="field-display"></span>
          <input type="hidden" id="hd" class="hidden" placeholder="HD" data-formattable data-expandable data-field-key="hd" data-sizing-key="hd_sizing_text" />
        </div>
      </div>

      <!-- Row 4: race, background, and alignment -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="race">Race</label>
          <span id="race-display" class="field-display"></span>
          <input type="hidden" id="race" class="hidden" placeholder="Race" data-formattable data-expandable data-field-key="race" data-sizing-key="race_line_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="background">Background</label>
          <span id="background-display" class="field-display"></span>
          <input type="hidden" id="background" class="hidden" placeholder="Background" data-formattable data-expandable data-field-key="background" data-sizing-key="race_line_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="alignment">Alignment</label>
          <span id="alignment-display" class="field-display"></span>
          <input type="hidden" id="alignment" class="hidden" placeholder="Alignment" data-formattable data-expandable data-field-key="alignment" data-sizing-key="race_line_sizing_text" />
        </div>
      </div>

      <!-- Row 5: age, height, weight, and size category -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="age">Age</label>
          <span id="age-display" class="field-display"></span>
          <input type="hidden" id="age" class="hidden" placeholder="Age" data-formattable data-expandable data-field-key="age" data-sizing-key="physical_measureable_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="height">Height</label>
          <span id="height-display" class="field-display"></span>
          <input type="hidden" id="height" class="hidden" placeholder="Height" data-formattable data-expandable data-field-key="height" data-sizing-key="physical_measureable_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="weight">Weight</label>
          <span id="weight-display" class="field-display"></span>
          <input type="hidden" id="weight" class="hidden" placeholder="Weight" data-formattable data-expandable data-field-key="weight" data-sizing-key="physical_measureable_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="size-category">Size Category</label>
          <span id="size-category-display" class="field-display"></span>
          <input type="hidden" id="size-category" class="hidden" placeholder="Size Category" data-formattable data-expandable data-field-key="size_category" data-sizing-key="physical_measureable_sizing_text" />
        </div>
      </div>

      <!-- Row 6: eyes, hair, and skin -->
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="eyes">Eyes</label>
          <span id="eyes-display" class="field-display"></span>
          <input type="hidden" id="eyes" class="hidden" placeholder="Eyes" data-formattable data-expandable data-field-key="eyes" data-sizing-key="physical_description_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="hair">Hair</label>
          <span id="hair-display" class="field-display"></span>
          <input type="hidden" id="hair" class="hidden" placeholder="Hair" data-formattable data-expandable data-field-key="hair" data-sizing-key="physical_description_sizing_text" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="skin">Skin</label>
          <span id="skin-display" class="field-display"></span>
          <input type="hidden" id="skin" class="hidden" placeholder="Skin" data-formattable data-expandable data-field-key="skin" data-sizing-key="physical_description_sizing_text" />
        </div>
      </div>

      <!-- Rows 7–10: personality traits, ideals, bonds, traits — grid-aligned -->
      <div class="trait-rows">
        <label for="personality-traits">Personality<br>Traits</label>
        <span id="personality-traits-display" class="field-display" style="white-space: pre-wrap; overflow-wrap: break-word;"></span>
        <input type="hidden" id="personality-traits" class="hidden" placeholder="Personality traits" data-formattable data-expandable data-field-key="personality_traits" />

        <label for="ideals">Ideals</label>
        <span id="ideals-display" class="field-display" style="white-space: pre-wrap; overflow-wrap: break-word;"></span>
        <input type="hidden" id="ideals" class="hidden" placeholder="Ideals" data-formattable data-expandable data-field-key="ideals" />

        <label for="bonds">Bonds</label>
        <span id="bonds-display" class="field-display" style="white-space: pre-wrap; overflow-wrap: break-word;"></span>
        <input type="hidden" id="bonds" class="hidden" placeholder="Bonds" data-formattable data-expandable data-field-key="bonds" />

        <label for="traits">Traits</label>
        <span id="traits-display" class="field-display" style="white-space: pre-wrap; overflow-wrap: break-word;"></span>
        <input type="hidden" id="traits" class="hidden" placeholder="Traits" data-formattable data-expandable data-field-key="traits" />
      </div>

      <!-- Background, History, Allies, & Affiliations -->
      <div class="bha-section">
        <div class="bha-header">Background, History, Allies, &amp; Affiliations</div>
        <div id="background-history-display" class="field-display"></div>
        <input type="hidden" id="background-history" class="hidden" data-2col data-formattable data-expandable data-field-key="background_history" />
      </div>

      </div>
    </div>

    <!-- Campaign Notes panel: add button + scrollable list of note cards -->
    <div id="panel-campaign" class="panel">
      <button class="btn" id="add-note-btn">Add Note</button>
      <div id="notes-list"></div>
    </div>
  </section>

  <!-- Sidebar: save action and status feedback -->
  <aside id="sidebar">
    <h2>Actions</h2>
    <button id="save-btn">Save</button>
    <div id="status"></div>
  </aside>

  <!-- Note dialog: resizable dialog for adding and editing campaign notes. -->
  <div id="note-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="note-dialog-box">
      <input type="text" id="note-dialog-tags" placeholder="Tags (comma-separated)" />
      <textarea id="note-dialog-text" data-formattable></textarea>
      <div id="note-dialog-btns">
        <div id="note-dialog-hints">
          <span id="note-dialog-hint"></span>
          <span id="note-dialog-syntax-hint"></span>
        </div>
        <button id="note-dialog-done-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- Edit dialog: centered resizable textarea opened when clicking a data-expandable field display.
       Sits below the link dialog in z-index so cmd-k still works while editing. -->
  <div id="edit-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="edit-dialog-box">
      <textarea id="edit-dialog-textarea" data-formattable></textarea>
      <div id="edit-dialog-btns">
        <div id="edit-dialog-hints">
          <span id="edit-dialog-hint"></span>
          <span id="edit-dialog-syntax-hint"></span>
        </div>
        <button id="edit-dialog-done-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- Link dialog: small overlay for inserting or removing a markdown link on selected text.
       Sits above the edit dialog in z-index so it can be opened from within it. -->
  <div id="link-dialog" class="hidden" role="dialog" aria-modal="true">
    <div id="link-dialog-box">
      <label for="link-url">URL</label>
      <input type="text" id="link-url" placeholder="https://…" />
      <div id="link-dialog-btns">
        <span id="link-dialog-hint"></span>
        <button id="link-ok-btn">Done</button>
        <button id="link-remove-btn" class="hidden">Remove link</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
