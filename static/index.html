<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&amp;D Character Sheet</title>
  <style>
    :root {
      --main-bg: #1a1a2e;
      --sidebar-bg: #16213e;
      --textbox-bg: #0f3460;
      --card-bg: #16213e;
      --tag-bg: #0f3460;
      --header-font: Helvetica Neue, Arial, sans-serif;
      --header-font-size: 14px;
      --header-fontcolor: #e8c96d;
      --button-font: Helvetica Neue, Arial, sans-serif;
      --button-font-size: 14px;
      --button-fontcolor: #1a1a2e;
      --button-bg: #e8c96d;
      --save-button-bg: #c0392b;
      --save-button-fontcolor: #ffffff;
      --sheet-font: Helvetica Neue, Arial, sans-serif;
      --sheet-font-size: 15px;
      --sheet-fontcolor: #e0d7c6;
      --muted: color-mix(in srgb, var(--sheet-fontcolor) 50%, var(--main-bg));
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      background: var(--main-bg);
      color: var(--sheet-fontcolor);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Layout ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1rem;
    }

    #sidebar {
      width: 200px;
      background: var(--sidebar-bg);
      border-left: 1px solid color-mix(in srgb, var(--sidebar-bg) 60%, white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--muted);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      padding: 0.5rem 1.25rem;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--header-fontcolor);
      border-bottom-color: var(--header-fontcolor);
    }

    .tab-btn:hover:not(.active) {
      color: color-mix(in srgb, var(--header-fontcolor) 60%, var(--muted));
    }

    /* ── Tab panels ── */
    .panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Form fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      color: var(--muted);
    }

    input[type="text"],
    textarea {
      background: var(--textbox-bg);
      border: 1px solid color-mix(in srgb, var(--textbox-bg) 50%, white);
      border-radius: 6px;
      color: var(--sheet-fontcolor);
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      padding: 0.6rem 0.8rem;
      width: 100%;
      transition: border-color 0.15s;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--header-fontcolor);
      outline: none;
    }

    /* ── Campaign notes ── */
    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .note-card {
      background: var(--card-bg);
      border: 1px solid color-mix(in srgb, var(--card-bg) 60%, white);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .note-card .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .tag-chip {
      background: var(--tag-bg);
      border: 1px solid color-mix(in srgb, var(--tag-bg) 50%, white);
      border-radius: 20px;
      color: var(--header-fontcolor);
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      padding: 0.2rem 0.65rem;
    }

    .note-entry {
      color: var(--sheet-fontcolor);
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      line-height: 1.5;
      padding-left: 1rem;
      border-left: 2px solid var(--muted);
    }

    /* ── Add-note form ── */
    #add-note-section {
      border-top: 1px solid var(--muted);
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #add-note-section h3 {
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      font-weight: normal;
      color: var(--muted);
    }

    .btn {
      background: var(--button-bg);
      border: none;
      border-radius: 6px;
      color: var(--button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.6rem 1.2rem;
      transition: background 0.15s, transform 0.05s;
      width: 100%;
    }

    .btn:hover {
      background: color-mix(in srgb, var(--button-bg) 80%, white);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* ── Sidebar ── */
    #sidebar h2 {
      font-family: var(--header-font);
      font-size: var(--header-font-size);
      font-weight: normal;
      color: var(--muted);
      text-align: center;
    }

    #save-btn {
      background: var(--save-button-bg);
      border: none;
      border-radius: 8px;
      color: var(--save-button-fontcolor);
      cursor: pointer;
      font-family: var(--button-font);
      font-size: var(--button-font-size);
      font-weight: normal;
      padding: 0.8rem 1.2rem;
      transition: background 0.15s, transform 0.05s;
      width: 100%;
      letter-spacing: 0.04em;
    }

    #save-btn:hover {
      background: color-mix(in srgb, var(--save-button-bg) 80%, white);
    }

    #save-btn:active {
      transform: scale(0.97);
    }

    #status {
      font-family: var(--sheet-font);
      font-size: var(--sheet-font-size);
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }

    #status.ok {
      color: #2ecc71;
    }

    #status.err {
      color: #e74c3c;
    }
  </style>
</head>

<body>
  <section id="main">
    <nav id="tabs">
      <button class="tab-btn active" data-tab="bio">Bio</button>
      <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
    </nav>

    <!-- Bio panel -->
    <div id="panel-bio" class="panel active">
      <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: flex-end;">
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="player-name">Player Name</label>
          <input type="text" id="player-name" placeholder="Your name" style="padding: 0.2rem 0.4rem;" />
        </div>
        <div class="field" style="flex-direction: row; align-items: center;">
          <label for="character-name">Character Name</label>
          <input type="text" id="character-name" placeholder="Character name" style="padding: 0.2rem 0.4rem;" />
        </div>
      </div>
    </div>

    <!-- Campaign Notes panel -->
    <div id="panel-campaign" class="panel">
      <div id="notes-list"></div>

      <div id="add-note-section">
        <h3>Add Note</h3>
        <div class="field">
          <label for="new-tags">Tags (comma-separated)</label>
          <input type="text" id="new-tags" placeholder="session-3, dungeon" />
        </div>
        <div class="field">
          <label for="new-note">Note</label>
          <textarea id="new-note" rows="3" placeholder="Write a note…"></textarea>
        </div>
        <button class="btn" id="add-note-btn">Add Note</button>
      </div>
    </div>
  </section>

  <aside id="sidebar">
    <h2>Actions</h2>
    <button id="save-btn">Save</button>
    <div id="status"></div>
  </aside>

  <script>
    let character = null;

    const _measureCanvas = document.createElement("canvas");

    function fitInput(el, sizingText) {
      const ctx = _measureCanvas.getContext("2d");
      ctx.font = getComputedStyle(el).font;
      const textW = ctx.measureText(sizingText).width;
      const cs = getComputedStyle(el);
      const padW = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight) + 4;
      el.style.width = Math.max(textW + padW, 160) + "px";
    }

    async function applyConfig() {
      const res = await fetch("/api/config");
      const cfg = await res.json();
      const root = document.documentElement;

      const direct = [
        ["main_bg", "--main-bg"],
        ["sidebar_bg", "--sidebar-bg"],
        ["textbox_bg", "--textbox-bg"],
        ["card_bg", "--card-bg"],
        ["tag_bg", "--tag-bg"],
        ["header_font", "--header-font"],
        ["header_fontcolor", "--header-fontcolor"],
        ["button_font", "--button-font"],
        ["button_fontcolor", "--button-fontcolor"],
        ["button_bg", "--button-bg"],
        ["save_button_bg", "--save-button-bg"],
        ["save_button_fontcolor", "--save-button-fontcolor"],
        ["sheet_font", "--sheet-font"],
        ["sheet_fontcolor", "--sheet-fontcolor"],
      ];
      const px = [
        ["header_font_size", "--header-font-size"],
        ["button_font_size", "--button-font-size"],
        ["sheet_font_size", "--sheet-font-size"],
      ];

      for (const [key, cssVar] of direct) {
        if (cfg[key] != null) root.style.setProperty(cssVar, cfg[key]);
      }
      for (const [key, cssVar] of px) {
        if (cfg[key] != null) root.style.setProperty(cssVar, cfg[key] + "px");
      }

      if (cfg.player_name_sizing_text)
        fitInput(document.getElementById("player-name"), cfg.player_name_sizing_text);
      if (cfg.character_name_sizing_text)
        fitInput(document.getElementById("character-name"), cfg.character_name_sizing_text);
    }

    async function load() {
      const [, charRes] = await Promise.all([applyConfig(), fetch("/api/character")]);
      character = await charRes.json();
      render();
    }

    function render() {
      document.getElementById("player-name").value = character.bio?.player_name ?? "";
      document.getElementById("character-name").value = character.bio?.character_name ?? "";
      renderNotes();
    }

    function renderNotes() {
      const list = document.getElementById("notes-list");
      list.innerHTML = "";
      (character.campaign_notes ?? []).forEach((note) => {
        const card = document.createElement("div");
        card.className = "note-card";

        const tagsRow = document.createElement("div");
        tagsRow.className = "tags-row";
        (note.tags ?? []).forEach((tag) => {
          const chip = document.createElement("span");
          chip.className = "tag-chip";
          chip.textContent = tag;
          tagsRow.appendChild(chip);
        });
        card.appendChild(tagsRow);

        (note.notes ?? []).forEach((n) => {
          const p = document.createElement("p");
          p.className = "note-entry";
          p.textContent = n;
          card.appendChild(p);
        });

        list.appendChild(card);
      });
    }

    function collectCharacter() {
      return {
        bio: {
          player_name: document.getElementById("player-name").value,
          character_name: document.getElementById("character-name").value,
        },
        campaign_notes: character.campaign_notes ?? [],
      };
    }

    async function autosave() {
      const data = collectCharacter();
      character = data;
      await fetch("/api/character", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
    }

    function setStatus(msg, cls) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = cls;
      if (cls === "ok") setTimeout(() => (el.textContent = ""), 2500);
    }

    document.getElementById("player-name").addEventListener("input", autosave);
    document.getElementById("character-name").addEventListener("input", autosave);

    document.getElementById("add-note-btn").addEventListener("click", async () => {
      const rawTags = document.getElementById("new-tags").value;
      const rawNote = document.getElementById("new-note").value.trim();
      if (!rawNote) return;
      const tags = rawTags
        .split(",")
        .map((t) => t.trim())
        .filter(Boolean);
      if (tags.length === 0) tags.push("general");
      character.campaign_notes = character.campaign_notes ?? [];
      character.campaign_notes.push({ tags, notes: [rawNote] });
      document.getElementById("new-tags").value = "";
      document.getElementById("new-note").value = "";
      renderNotes();
      await autosave();
    });

    document.getElementById("save-btn").addEventListener("click", async () => {
      try {
        const data = collectCharacter();
        character = data;
        const res = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.ok) {
          setStatus("Saved!", "ok");
        } else {
          setStatus("Error: " + json.error, "err");
        }
      } catch (e) {
        setStatus("Save failed", "err");
      }
    });

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
      });
    });

    load();
  </script>
</body>

</html>
