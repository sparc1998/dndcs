<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&amp;D Character Sheet</title>
    <style>
      :root {
        --bgcolor: #1a1a2e;
        --fontcolor: #e0d7c6;
        --font: "Segoe UI", system-ui, sans-serif;
        --font-size: 15px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        font-size: var(--font-size);
        background: var(--bgcolor);
        color: var(--fontcolor);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* ── Layout ── */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 1.5rem;
        gap: 1rem;
      }

      #sidebar {
        width: 200px;
        background: #16213e;
        border-left: 1px solid #2a2a4a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem 1rem;
        gap: 1rem;
      }

      /* ── Tabs ── */
      #tabs {
        display: flex;
        gap: 0.5rem;
        border-bottom: 2px solid #2a2a4a;
        padding-bottom: 0;
      }

      .tab-btn {
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        color: #a09080;
        cursor: pointer;
        font-size: 1rem;
        padding: 0.5rem 1.25rem;
        margin-bottom: -2px;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn.active {
        color: #e8c96d;
        border-bottom-color: #e8c96d;
      }

      .tab-btn:hover:not(.active) {
        color: #c8b890;
      }

      /* ── Tab panels ── */
      .panel {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 1rem 0;
      }

      .panel.active {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      /* ── Form fields ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #a09080;
      }

      input[type="text"],
      textarea {
        background: #0f3460;
        border: 1px solid #2a2a6a;
        border-radius: 6px;
        color: #e0d7c6;
        font-family: inherit;
        font-size: 1rem;
        padding: 0.6rem 0.8rem;
        width: 100%;
        transition: border-color 0.15s;
        resize: vertical;
      }

      input[type="text"]:focus,
      textarea:focus {
        border-color: #e8c96d;
        outline: none;
      }

      /* ── Campaign notes ── */
      #notes-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .note-card {
        background: #16213e;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .note-card .tags-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: center;
      }

      .tag-chip {
        background: #0f3460;
        border: 1px solid #2a2a6a;
        border-radius: 20px;
        color: #e8c96d;
        font-size: 0.78rem;
        padding: 0.2rem 0.65rem;
      }

      .note-entry {
        color: #c8c0b0;
        font-size: 0.95rem;
        line-height: 1.5;
        padding-left: 1rem;
        border-left: 2px solid #2a2a6a;
      }

      /* ── Add-note form ── */
      #add-note-section {
        border-top: 1px solid #2a2a4a;
        padding-top: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      #add-note-section h3 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #a09080;
      }

      .btn {
        background: #e8c96d;
        border: none;
        border-radius: 6px;
        color: #1a1a2e;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        transition: background 0.15s, transform 0.05s;
        width: 100%;
      }

      .btn:hover {
        background: #f0d87a;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-secondary {
        background: #2a2a4a;
        color: #e0d7c6;
      }

      .btn-secondary:hover {
        background: #3a3a5a;
      }

      /* ── Sidebar ── */
      #sidebar h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #a09080;
        text-align: center;
      }

      #save-btn {
        background: #c0392b;
        border: none;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        padding: 0.8rem 1.2rem;
        transition: background 0.15s, transform 0.05s;
        width: 100%;
        letter-spacing: 0.04em;
      }

      #save-btn:hover {
        background: #e74c3c;
      }

      #save-btn:active {
        transform: scale(0.97);
      }

      #status {
        font-size: 0.78rem;
        color: #a09080;
        text-align: center;
        min-height: 1.2em;
      }

      #status.ok {
        color: #2ecc71;
      }

      #status.err {
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <section id="main">
      <nav id="tabs">
        <button class="tab-btn active" data-tab="bio">Bio</button>
        <button class="tab-btn" data-tab="campaign">Campaign Notes</button>
      </nav>

      <!-- Bio panel -->
      <div id="panel-bio" class="panel active">
        <div class="field">
          <label for="player-name">Player Name</label>
          <input type="text" id="player-name" placeholder="Your name" />
        </div>
        <div class="field">
          <label for="character-name">Character Name</label>
          <input type="text" id="character-name" placeholder="Character name" />
        </div>
      </div>

      <!-- Campaign Notes panel -->
      <div id="panel-campaign" class="panel">
        <div id="notes-list"></div>

        <div id="add-note-section">
          <h3>Add Note</h3>
          <div class="field">
            <label for="new-tags">Tags (comma-separated)</label>
            <input type="text" id="new-tags" placeholder="session-3, dungeon" />
          </div>
          <div class="field">
            <label for="new-note">Note</label>
            <textarea id="new-note" rows="3" placeholder="Write a note…"></textarea>
          </div>
          <button class="btn btn-secondary" id="add-note-btn">Add Note</button>
        </div>
      </div>
    </section>

    <aside id="sidebar">
      <h2>Actions</h2>
      <button id="save-btn">Save</button>
      <div id="status"></div>
    </aside>

    <script>
      let character = null;

      async function applyConfig() {
        const res = await fetch("/api/config");
        const cfg = await res.json();
        const root = document.documentElement;
        if (cfg.bgcolor) root.style.setProperty("--bgcolor", cfg.bgcolor);
        if (cfg.fontcolor) root.style.setProperty("--fontcolor", cfg.fontcolor);
        if (cfg.font) root.style.setProperty("--font", cfg.font);
        if (cfg.font_size) root.style.setProperty("--font-size", cfg.font_size + "px");
      }

      async function load() {
        const [, charRes] = await Promise.all([applyConfig(), fetch("/api/character")]);
        character = await charRes.json();
        render();
      }

      function render() {
        document.getElementById("player-name").value = character.bio?.player_name ?? "";
        document.getElementById("character-name").value = character.bio?.character_name ?? "";
        renderNotes();
      }

      function renderNotes() {
        const list = document.getElementById("notes-list");
        list.innerHTML = "";
        (character.campaign_notes ?? []).forEach((note, idx) => {
          const card = document.createElement("div");
          card.className = "note-card";

          const tagsRow = document.createElement("div");
          tagsRow.className = "tags-row";
          (note.tags ?? []).forEach((tag) => {
            const chip = document.createElement("span");
            chip.className = "tag-chip";
            chip.textContent = tag;
            tagsRow.appendChild(chip);
          });
          card.appendChild(tagsRow);

          (note.notes ?? []).forEach((n) => {
            const p = document.createElement("p");
            p.className = "note-entry";
            p.textContent = n;
            card.appendChild(p);
          });

          list.appendChild(card);
        });
      }

      function collectCharacter() {
        return {
          bio: {
            player_name: document.getElementById("player-name").value,
            character_name: document.getElementById("character-name").value,
          },
          campaign_notes: character.campaign_notes ?? [],
        };
      }

      async function autosave() {
        const data = collectCharacter();
        character = data;
        await fetch("/api/character", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
      }

      function setStatus(msg, cls) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = cls;
        if (cls === "ok") setTimeout(() => (el.textContent = ""), 2500);
      }

      document.getElementById("player-name").addEventListener("input", autosave);
      document.getElementById("character-name").addEventListener("input", autosave);

      document.getElementById("add-note-btn").addEventListener("click", async () => {
        const rawTags = document.getElementById("new-tags").value;
        const rawNote = document.getElementById("new-note").value.trim();
        if (!rawNote) return;
        const tags = rawTags
          .split(",")
          .map((t) => t.trim())
          .filter(Boolean);
        if (tags.length === 0) tags.push("general");
        character.campaign_notes = character.campaign_notes ?? [];
        character.campaign_notes.push({ tags, notes: [rawNote] });
        document.getElementById("new-tags").value = "";
        document.getElementById("new-note").value = "";
        renderNotes();
        await autosave();
      });

      document.getElementById("save-btn").addEventListener("click", async () => {
        try {
          const data = collectCharacter();
          character = data;
          const res = await fetch("/api/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const json = await res.json();
          if (json.ok) {
            setStatus("Saved!", "ok");
          } else {
            setStatus("Error: " + json.error, "err");
          }
        } catch (e) {
          setStatus("Save failed", "err");
        }
      });

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
          document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
        });
      });

      load();
    </script>
  </body>
</html>
